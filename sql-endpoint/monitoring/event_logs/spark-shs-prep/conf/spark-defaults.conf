# ─────────────────────────────────────────────────────────────
# Spark History Server — spark-defaults.conf
# Baked into the image; env vars override at runtime via
# the entrypoint script.
# ─────────────────────────────────────────────────────────────

# ── Event log location (set by entrypoint from $OUTPUT_DIR) ──
spark.history.fs.logDirectory               file:///shs-logs

# ── UI ────────────────────────────────────────────────────────
spark.history.ui.port                       18080
spark.history.ui.maxApplications            500

# ── Retention & scanning ──────────────────────────────────────
spark.history.retainedApplications          100
spark.history.fs.update.interval            10s
spark.history.fs.cleaner.enabled            false

# ── No codec confusion — logs land as plain text ──────────────
spark.io.compression.codec                  none

# ── Event log settings (informational — used by submitters) ───
spark.eventLog.enabled                      true
spark.eventLog.compress                     false

# ── Security (disabled by default, enable as needed) ──────────
spark.history.ui.acls.enable                false
